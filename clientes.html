<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Angel Tour Brasil | Gestión de Clientes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0B1120 0%, #192132 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            color: #E2E8F0;
            transition: background 0.3s ease;
        }

        body.light-mode {
            background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
            color: #0F172A;
        }

        body.light-mode .container {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(14, 165, 233, 0.3);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.15);
        }

        body.light-mode .stats-card {
            background: rgba(0, 0, 0, 0.02);
            border-color: #CBD5E1;
        }

        body.light-mode .table-container {
            background: white;
        }

        body.light-mode th {
            background: #F8FAFC;
            color: #475569;
        }

        body.light-mode td {
            border-bottom-color: #E2E8F0;
            color: #1E293B;
        }

        body.light-mode .btn-icon {
            background: white;
            border-color: #E2E8F0;
            color: #64748B;
        }

        body.light-mode .btn-icon:hover {
            background: #0EA5E9;
            color: white;
            border-color: #0EA5E9;
        }

        body.light-mode .search-input {
            background: white;
            border-color: #E2E8F0;
            color: #1E293B;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header con logo centrado */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .logo-area img {
            height: 60px;
            width: auto;
        }

        .logo-area h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #60A5FA);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo-area h1 span {
            background: linear-gradient(135deg, #0EA5E9, #3B82F6);
            background-clip: text;
            -webkit-background-clip: text;
        }

        /* Barra de acciones debajo del logo */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 12px 24px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            margin-bottom: 28px;
        }

        body.light-mode .action-bar {
            background: rgba(255, 255, 255, 0.9);
            border-color: #CBD5E1;
        }

        /* Menú flotante izquierda */
        .floating-menu {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .menu-toggle {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #0EA5E9, #3B82F6);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 20px;
            transition: all 0.3s;
        }

        .menu-toggle:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.4);
        }

        .menu-dropdown {
            position: absolute;
            top: 50px;
            left: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(56, 189, 248, 0.3);
            min-width: 200px;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        body.light-mode .menu-dropdown {
            background: white;
            border-color: #E2E8F0;
        }

        .floating-menu.open .menu-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: #E2E8F0;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
            cursor: pointer;
        }

        body.light-mode .menu-item {
            color: #1E293B;
            border-bottom-color: #E2E8F0;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover {
            background: rgba(14, 165, 233, 0.2);
            color: #0EA5E9;
        }

        .menu-item i {
            font-size: 18px;
        }

        .menu-item.logout {
            color: #EF4444;
            border-top: 1px solid rgba(56, 189, 248, 0.1);
        }

        body.light-mode .menu-item.logout {
            border-top-color: #E2E8F0;
        }

        .menu-item.logout:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #EF4444;
        }

        /* Botones de acción derecha */
        .right-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-icon {
            width: 42px;
            height: 42px;
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.25);
            color: #E2E8F0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
        }

        .btn-icon:hover {
            background: #0EA5E9;
            border-color: #0EA5E9;
            transform: scale(1.02);
            color: white;
        }

        .action-btn {
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0EA5E9, #3B82F6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(14, 165, 233, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #E2E8F0;
            border: 1px solid rgba(56, 189, 248, 0.25);
        }

        body.light-mode .btn-secondary {
            background: white;
            color: #1E293B;
            border-color: #E2E8F0;
        }

        .btn-secondary:hover {
            background: #0EA5E9;
            color: white;
            border-color: #0EA5E9;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .stats-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .stats-card .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #0EA5E9;
        }

        .stats-card .stat-label {
            font-size: 13px;
            color: #94A3B8;
            margin-top: 5px;
        }

        body.light-mode .stats-card .stat-label {
            color: #64748B;
        }

        /* Search */
        .search-bar {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 12px 16px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 40px;
            background: rgba(15, 23, 42, 0.6);
            color: #E2E8F0;
            font-size: 14px;
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: #0EA5E9;
        }

        body.light-mode .search-input {
            background: white;
            border-color: #E2E8F0;
            color: #1E293B;
        }

        /* Table */
        .table-container {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        th {
            text-align: left;
            padding: 16px 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #94A3B8;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.1);
            font-size: 14px;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(14, 165, 233, 0.05);
        }

        /* Botones de acción en tabla */
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-table {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: transparent;
            border: 1px solid rgba(56, 189, 248, 0.3);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #94A3B8;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn-table:hover {
            transform: scale(1.05);
        }

        .btn-edit:hover {
            background: rgba(14, 165, 233, 0.2);
            color: #0EA5E9;
            border-color: #0EA5E9;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #EF4444;
            border-color: #EF4444;
        }

        .btn-whatsapp:hover {
            background: rgba(37, 211, 102, 0.2);
            color: #25D366;
            border-color: #25D366;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            max-width: 500px;
            width: 90%;
            padding: 24px;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        body.light-mode .modal-content {
            background: white;
            border-color: #E2E8F0;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-body .form-group {
            margin-bottom: 16px;
        }

        .modal-body label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #94A3B8;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .modal-body input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #E2E8F0;
            font-size: 14px;
            font-family: inherit;
        }

        body.light-mode .modal-body input {
            background: #F8FAFC;
            border-color: #E2E8F0;
            color: #1E293B;
        }

        .modal-body input:focus {
            outline: none;
            border-color: #0EA5E9;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(56, 189, 248, 0.2);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1F2937;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1000;
            display: none;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .action-bar {
                flex-direction: column;
                align-items: stretch;
                border-radius: 20px;
                padding: 12px 16px;
            }
            .right-actions {
                justify-content: center;
            }
            .search-input {
                max-width: 100%;
            }
        }
    </style>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

<div class="container">
    <!-- Header con logo centrado -->
    <div class="header">
        <div class="logo-area">
            <img src="https://sebagsc2020.github.io/angeltourbrasil/images/logoangel.png" alt="Angel Tour Brasil">
            <h1>Angel Tour <span>Brasil</span></h1>
        </div>
        
        <!-- Barra de acciones debajo del logo -->
        <div class="action-bar">
            <!-- Menú flotante IZQUIERDA -->
            <div class="floating-menu" id="floatingMenu">
                <div class="menu-toggle" onclick="toggleMenu()">
                    <i class="ph ph-list"></i>
                </div>
                <div class="menu-dropdown">
                    <div class="menu-item" onclick="irAReservas()">
                        <i class="ph ph-calendar-check"></i> Reservas
                    </div>
                    <div class="menu-item active" onclick="irAClientes()">
                        <i class="ph ph-users"></i> Clientes
                    </div>
                    <div class="menu-item logout" onclick="logout()">
                        <i class="ph ph-sign-out"></i> Cerrar Sesión
                    </div>
                </div>
            </div>
            
            <!-- Acciones derecha -->
            <div class="right-actions">
                <button class="btn-icon" id="themeBtn" onclick="toggleTheme()">
                    <i class="ph ph-moon" id="themeIcon"></i>
                </button>
                <button class="action-btn btn-secondary" onclick="cargarClientes()">
                    <i class="ph ph-arrows-clockwise"></i> Actualizar
                </button>
                <button class="action-btn btn-primary" onclick="exportarExcel()">
                    <i class="ph ph-download-simple"></i> Exportar
                </button>
            </div>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
        <div class="stats-card">
            <div class="stat-value" id="totalClientes">0</div>
            <div class="stat-label">Total Clientes</div>
        </div>
        <div class="stats-card">
            <div class="stat-value" id="totalPasajeros">0</div>
            <div class="stat-label">Total Pasajeros</div>
        </div>
        <div class="stats-card">
            <div class="stat-value" id="totalIngresos">R$ 0</div>
            <div class="stat-label">Ingresos Totales</div>
        </div>
        <div class="stats-card">
            <div class="stat-value" id="gastoMedio">R$ 0</div>
            <div class="stat-label">Gasto Medio por Cliente</div>
        </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Buscar por nombre, email o empresa..." onkeyup="filtrarClientes()">
    </div>

    <!-- Tabla de Clientes -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nombre Completo</th>
                    <th>Email</th>
                    <th>Teléfono</th>
                    <th>Empresa</th>
                    <th>Valor Total</th>
                    <th>Cant. Pasajeros</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="clientesTableBody">
                <tr><td colspan="7" style="text-align:center;">Cargando clientes...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Editar Cliente -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="ph ph-pencil-simple"></i> Editar Cliente</h3>
            <button class="btn-icon" onclick="cerrarModal()" style="width:32px;height:32px;"><i class="ph ph-x"></i></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editId">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="editNombre" placeholder="Nombre completo">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="editEmail" placeholder="Email">
            </div>
            <div class="form-group">
                <label>Teléfono (WhatsApp)</label>
                <input type="text" id="editTelefono" placeholder="Ej: 5511999999999">
            </div>
            <div class="form-group">
                <label>Empresa</label>
                <input type="text" id="editEmpresa" placeholder="Empresa">
            </div>
        </div>
        <div class="modal-footer">
            <button class="action-btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
            <button class="action-btn btn-primary" onclick="guardarEdicion()">Guardar Cambios</button>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // Verificar sesión
    if (!sessionStorage.getItem("admin_logged")) {
        window.location.href = "login.html";
    }

    // URL de la API de Google Sheets
    const SHEETS_API_URL = "https://docs.google.com/spreadsheets/d/1uOAcy1X8yMHDK03CUKLix4cUm_l4m3E4vaZHgSk33as/gviz/tq?tqx=out:json";
    
    let clientesData = [];
    let clientesOriginal = [];

    function toggleMenu() {
        document.getElementById('floatingMenu').classList.toggle('open');
    }

    // Cerrar menú al hacer clic fuera
    document.addEventListener('click', function(e) {
        const menu = document.getElementById('floatingMenu');
        if (menu && !menu.contains(e.target) && menu.classList.contains('open')) {
            menu.classList.remove('open');
        }
    });

    function irAReservas() {
        window.location.href = 'reservas.html';
    }

    function irAClientes() {
        window.location.href = 'clientes.html';
    }

    function logout() {
        if (confirm('¿Cerrar sesión?')) {
            sessionStorage.removeItem('admin_logged');
            window.location.href = 'login.html';
        }
    }

    function mostrarToast(mensaje, error = false) {
        const toast = document.getElementById('toast');
        toast.textContent = mensaje;
        toast.style.background = error ? '#dc2626' : '#1f2937';
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    async function cargarClientes() {
        try {
            mostrarToast('Cargando clientes...');
            
            const response = await fetch(SHEETS_API_URL);
            const text = await response.text();
            const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
            const data = JSON.parse(jsonStr);
            
            const rows = data.table.rows;
            const clientesMap = new Map();
            
            for (let i = 1; i < rows.length; i++) {
                const cells = rows[i].c;
                if (cells && cells.length >= 8) {
                    const nombre = cells[2]?.v || '';      // Columna C: Nombre
                    const email = cells[4]?.v || '';       // Columna E: Email
                    const empresa = cells[3]?.v || '';     // Columna D: Empresa
                    const adultos = parseInt(cells[5]?.v) || 0;   // Columna F: Adultos
                    const menores = parseInt(cells[6]?.v) || 0;   // Columna G: Menores
                    const monto = parseFloat(cells[8]?.v) || 0;   // Columna I: R$ Total
                    
                    if (!nombre) continue;
                    
                    const key = nombre + email;
                    if (clientesMap.has(key)) {
                        const existing = clientesMap.get(key);
                        existing.totalGasto += monto;
                        existing.totalPasajeros += adultos + menores;
                        existing.cantidadReservas++;
                    } else {
                        clientesMap.set(key, {
                            nombre: nombre,
                            email: email,
                            telefono: '',
                            empresa: empresa,
                            totalGasto: monto,
                            totalPasajeros: adultos + menores,
                            cantidadReservas: 1
                        });
                    }
                }
            }
            
            clientesOriginal = Array.from(clientesMap.values());
            clientesData = [...clientesOriginal];
            
            actualizarEstadisticas();
            renderizarTabla();
            mostrarToast(`✅ ${clientesData.length} clientes cargados`);
            
        } catch(e) { 
            console.error("Error:", e);
            mostrarToast("Error al cargar clientes", true);
        }
    }

    function actualizarEstadisticas() {
        const totalClientes = clientesData.length;
        let totalPasajeros = 0;
        let totalIngresos = 0;
        
        clientesData.forEach(c => {
            totalPasajeros += c.totalPasajeros;
            totalIngresos += c.totalGasto;
        });
        
        document.getElementById('totalClientes').innerHTML = totalClientes;
        document.getElementById('totalPasajeros').innerHTML = totalPasajeros;
        document.getElementById('totalIngresos').innerHTML = `R$ ${totalIngresos.toFixed(2)}`;
        
        const gastoMedio = totalClientes > 0 ? totalIngresos / totalClientes : 0;
        document.getElementById('gastoMedio').innerHTML = `R$ ${gastoMedio.toFixed(2)}`;
    }

    function renderizarTabla() {
        const tbody = document.getElementById('clientesTableBody');
        if (clientesData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No hay clientes para mostrar</td></tr>';
            return;
        }
        
        tbody.innerHTML = clientesData.map(cliente => `
            <tr>
                <td style="font-weight:500;">${escapeHtml(cliente.nombre)}</td>
                <td>${escapeHtml(cliente.email)}</td>
                <td>${cliente.telefono ? escapeHtml(cliente.telefono) : '—'}</td>
                <td>${cliente.empresa ? escapeHtml(cliente.empresa) : '—'}</td>
                <td>R$ ${cliente.totalGasto.toFixed(2)}</td>
                <td>${cliente.totalPasajeros}</td>
                <td class="action-buttons">
                    <button class="btn-table btn-edit" onclick="editarCliente('${escapeHtml(cliente.nombre)}')" title="Editar">
                        <i class="ph ph-pencil-simple"></i>
                    </button>
                    <button class="btn-table btn-delete" onclick="eliminarCliente('${escapeHtml(cliente.nombre)}')" title="Eliminar">
                        <i class="ph ph-trash"></i>
                    </button>
                    <button class="btn-table btn-whatsapp" onclick="enviarWhatsapp('${escapeHtml(cliente.nombre)}', '${escapeHtml(cliente.email)}')" title="Enviar por WhatsApp">
                        <i class="ph ph-whatsapp-logo"></i>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    function filtrarClientes() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        clientesData = clientesOriginal.filter(c => 
            c.nombre.toLowerCase().includes(searchTerm) ||
            c.email.toLowerCase().includes(searchTerm) ||
            (c.empresa && c.empresa.toLowerCase().includes(searchTerm))
        );
        renderizarTabla();
        actualizarEstadisticas();
    }

    // Editar
    let clienteEditando = null;

    function editarCliente(nombre) {
        clienteEditando = clientesData.find(c => c.nombre === nombre);
        if (clienteEditando) {
            document.getElementById('editId').value = clienteEditando.nombre;
            document.getElementById('editNombre').value = clienteEditando.nombre;
            document.getElementById('editEmail').value = clienteEditando.email;
            document.getElementById('editTelefono').value = clienteEditando.telefono || '';
            document.getElementById('editEmpresa').value = clienteEditando.empresa || '';
            document.getElementById('editModal').classList.add('active');
        }
    }

    function cerrarModal() {
        document.getElementById('editModal').classList.remove('active');
        clienteEditando = null;
    }

    function guardarEdicion() {
        if (!clienteEditando) return;
        
        clienteEditando.nombre = document.getElementById('editNombre').value;
        clienteEditando.email = document.getElementById('editEmail').value;
        clienteEditando.telefono = document.getElementById('editTelefono').value;
        clienteEditando.empresa = document.getElementById('editEmpresa').value;
        
        const index = clientesData.findIndex(c => c.nombre === clienteEditando.nombre);
        if (index !== -1) {
            clientesData[index] = {...clienteEditando};
        }
        
        const indexOriginal = clientesOriginal.findIndex(c => c.nombre === clienteEditando.nombre);
        if (indexOriginal !== -1) {
            clientesOriginal[indexOriginal] = {...clienteEditando};
        }
        
        renderizarTabla();
        actualizarEstadisticas();
        mostrarToast('✅ Cliente actualizado');
        cerrarModal();
    }

    // Eliminar cliente (solo de la vista local)
    function eliminarCliente(nombre) {
        if (confirm(`¿Está seguro de eliminar a "${nombre}" de la lista? Esta acción solo afecta la vista actual.`)) {
            clientesData = clientesData.filter(c => c.nombre !== nombre);
            clientesOriginal = clientesOriginal.filter(c => c.nombre !== nombre);
            renderizarTabla();
            actualizarEstadisticas();
            mostrarToast('🗑️ Cliente eliminado localmente');
        }
    }

    // Enviar WhatsApp
    function enviarWhatsapp(nombre, email) {
        const cliente = clientesData.find(c => c.nombre === nombre);
        if (!cliente) return;
        
        let telefono = cliente.telefono;
        if (!telefono) {
            telefono = prompt(`Ingrese el número de WhatsApp para ${nombre} (código país + número):`, '55');
            if (!telefono) return;
            cliente.telefono = telefono;
        }
        
        let numeroLimpio = telefono.replace(/\D/g, '');
        if (!numeroLimpio.startsWith('55')) {
            numeroLimpio = '55' + numeroLimpio;
        }
        
        const mensaje = `Hola *${nombre}*, gracias por confiar en *Angel Tour Brasil*.\n\n` +
            `📊 *Resumen de tus reservas:*\n` +
            `💰 *Total invertido:* R$ ${cliente.totalGasto.toFixed(2)}\n` +
            `👥 *Total pasajeros:* ${cliente.totalPasajeros}\n` +
            `🏢 *Empresa:* ${cliente.empresa || 'No especificada'}\n\n` +
            `¡Esperamos verte pronto en Porto Belo! 🌊`;
        
        const url = `https://wa.me/${numeroLimpio}?text=${encodeURIComponent(mensaje)}`;
        window.open(url, '_blank');
        mostrarToast(`📱 Abriendo WhatsApp para ${nombre}`);
    }

    // Exportar a Excel
    function exportarExcel() {
        let csv = "Nombre Completo,Email,Teléfono,Empresa,Valor Total,Cantidad Pasajeros\n";
        clientesData.forEach(c => {
            csv += `"${c.nombre}","${c.email}","${c.telefono || ''}","${c.empresa || ''}",${c.totalGasto.toFixed(2)},${c.totalPasajeros}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', 'clientes_angeltour.csv');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        mostrarToast('📥 Exportación completada');
    }

    // Tema oscuro/claro
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        const icon = document.getElementById('themeIcon');
        if (document.body.classList.contains('light-mode')) {
            icon.className = 'ph ph-sun';
        } else {
            icon.className = 'ph ph-moon';
        }
    }

    if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light-mode');
        const icon = document.getElementById('themeIcon');
        if (icon) icon.className = 'ph ph-sun';
    }

    // Inicializar
    cargarClientes();
</script>

</body>
</html>
