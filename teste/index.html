<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario + Google Sheets</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 90%;
            max-width: 450px;
            transition: transform 0.3s;
        }
        .container:hover {
            transform: translateY(-5px);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        button:active {
            transform: translateY(0);
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .spinner {
            display: none;
            text-align: center;
            margin-top: 15px;
        }
        .spinner.active {
            display: block;
        }
        .spinner div {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📊 Guardar datos en Google Sheets</h2>
        
        <form id="dataForm">
            <div class="form-group">
                <label for="nombre">👤 Nombre:</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej: Juan Pérez">
            </div>
            
            <div class="form-group">
                <label for="numero">🔢 Número:</label>
                <input type="number" id="numero" name="numero" required placeholder="Ej: 25">
            </div>
            
            <button type="submit">💾 Guardar en Google Sheets</button>
        </form>
        
        <div id="message" class="message"></div>
        <div id="spinner" class="spinner"><div></div></div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwQJF8nyIjUqHlVtYXag29Umpd7_pmPRtEj472LdgwEqJ3zSpxNEOjU_b0biP8k46x-fw/exec';
        
        const form = document.getElementById('dataForm');
        const messageDiv = document.getElementById('message');
        const spinner = document.getElementById('spinner');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nombre = document.getElementById('nombre').value.trim();
            const numero = document.getElementById('numero').value;
            
            if (!nombre || !numero) {
                showMessage('Por favor completa ambos campos', 'error');
                return;
            }
            
            messageDiv.style.display = 'none';
            spinner.classList.add('active');
            
            const formData = new FormData();
            formData.append('nombre', nombre);
            formData.append('numero', numero);
            
            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });
                
                showMessage('✅ Datos guardados correctamente en Google Sheets', 'success');
                form.reset();
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Error al guardar los datos. Verifica la conexión.', 'error');
            } finally {
                spinner.classList.remove('active');
            }
        });
        
        function showMessage(msg, type) {
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
