<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Formulario Profesional | Angel Tour Style</title>
    <style>
        /* ===== RESET Y ESTILOS BASE (HEREDADOS DEL SITIO) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0B1120 0%, #192132 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            color: #E2E8F0;
        }

        /* Contenedor principal estilo tarjeta (como las tarjetas de tours) */
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(56, 189, 248, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px -12px rgba(0, 0, 0, 0.6);
        }

        /* Encabezado con ícono destacado */
        .header {
            padding: 2rem 2rem 0.5rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }

        .icon-badge {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0EA5E9, #3B82F6);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.3);
        }

        .icon-badge svg {
            width: 38px;
            height: 38px;
            stroke: white;
            stroke-width: 1.5;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #94A3B8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #94A3B8;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        /* Precio / etiqueta destacada */
        .price-tag {
            background: rgba(14, 165, 233, 0.15);
            border: 1px solid rgba(14, 165, 233, 0.3);
            border-radius: 100px;
            padding: 0.4rem 1rem;
            display: inline-block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #38BDF8;
            margin-bottom: 0.5rem;
        }

        /* ===== FORMULARIO ===== */
        .form-wrapper {
            padding: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94A3B8;
            margin-bottom: 0.6rem;
        }

        .label-icon {
            font-size: 1.1rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748B;
            font-size: 1.2rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: #0F172A;
            border: 1.5px solid #1E293B;
            border-radius: 1rem;
            font-size: 1rem;
            color: #F1F5F9;
            font-family: 'Poppins', monospace;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #0EA5E9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
            background: #111827;
        }

        input::placeholder {
            color: #475569;
            font-weight: 400;
        }

        /* Botón principal estilo "Reservar" */
        .btn-submit {
            width: 100%;
            background: linear-gradient(95deg, #0EA5E9, #3B82F6);
            border: none;
            padding: 1rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 0.5rem;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* Mensajes */
        .message {
            margin-top: 1.5rem;
            padding: 0.9rem;
            border-radius: 1rem;
            text-align: center;
            display: none;
            font-size: 0.85rem;
            font-weight: 500;
            backdrop-filter: blur(8px);
            animation: fadeSlide 0.3s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success {
            background: rgba(16, 185, 129, 0.15);
            color: #34D399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .error {
            background: rgba(239, 68, 68, 0.15);
            color: #F87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Spinner */
        .spinner {
            display: none;
            text-align: center;
            margin-top: 1.5rem;
        }

        .spinner.active {
            display: block;
        }

        .spinner-circle {
            width: 36px;
            height: 36px;
            border: 3px solid #1E293B;
            border-top-color: #0EA5E9;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            padding: 1rem 2rem;
            text-align: center;
            border-top: 1px solid rgba(56, 189, 248, 0.15);
            font-size: 0.7rem;
            color: #64748B;
            display: flex;
            justify-content: center;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.2);
        }

        .footer span {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .container {
                border-radius: 1.5rem;
            }
            .form-wrapper {
                padding: 1.5rem;
            }
            .header {
                padding: 1.5rem 1.5rem 0;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="icon-badge">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
        </div>
        <div class="price-tag">REGISTRO SEGURO</div>
        <h2>Google Sheets</h2>
        <p class="subtitle">Complete sus datos para guardar la información</p>
    </div>

    <div class="form-wrapper">
        <form id="dataForm">
            <div class="form-group">
                <label>
                    <span class="label-icon">👤</span>
                    NOMBRE COMPLETO
                </label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ej: Carlos Silva" autocomplete="name">
                </div>
            </div>

            <div class="form-group">
                <label>
                    <span class="label-icon">🔢</span>
                    NÚMERO / VALOR
                </label>
                <div class="input-wrapper">
                    <span class="input-icon">#</span>
                    <input type="number" id="numero" name="numero" required placeholder="Ej: 42" step="any">
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-linecap="round"/>
                </svg>
                GUARDAR EN SHEETS
            </button>
        </form>

        <div id="message" class="message"></div>
        <div id="spinner" class="spinner">
            <div class="spinner-circle"></div>
        </div>
    </div>

    <div class="footer">
        <span>🔒 Datos seguros</span>
        <span>☁️ Google Sheets</span>
        <span>⚡ Confirmación inmediata</span>
    </div>
</div>

<script>
    // ============================================================
    // ⚠️ IMPORTANTE: Reemplaza con la URL de tu Google Apps Script
    // ============================================================
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwQJF8nyIjUqHlVtYXag29Umpd7_pmPRtEj472LdgwEqJ3zSpxNEOjU_b0biP8k46x-fw/exec';

    // Elementos del DOM
    const form = document.getElementById('dataForm');
    const messageDiv = document.getElementById('message');
    const spinner = document.getElementById('spinner');
    const nombreInput = document.getElementById('nombre');
    const numeroInput = document.getElementById('numero');

    // Función para mostrar mensajes estilo toast
    function showMessage(msg, type) {
        messageDiv.textContent = msg;
        messageDiv.className = `message ${type}`;
        messageDiv.style.display = 'block';

        // Auto-ocultar después de 4.5 segundos
        setTimeout(() => {
            if (messageDiv.style.display === 'block') {
                messageDiv.style.opacity = '0';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                    messageDiv.style.opacity = '1';
                }, 300);
            }
        }, 4500);
    }

    // Manejo del envío del formulario (igual funcionamiento)
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const nombre = nombreInput.value.trim();
        const numero = numeroInput.value;

        // Validaciones básicas
        if (!nombre || numero === '') {
            showMessage('❌ Por favor completa ambos campos', 'error');
            return;
        }
        if (isNaN(numero) || numero === '') {
            showMessage('❌ Ingresa un número válido', 'error');
            return;
        }

        // Preparar para enviar
        messageDiv.style.display = 'none';
        spinner.classList.add('active');

        const formData = new FormData();
        formData.append('nombre', nombre);
        formData.append('numero', numero);

        try {
            // Mantenemos el mismo método de envío (mode: 'no-cors' para evitar CORS)
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            });

            showMessage('✅ ¡Datos guardados exitosamente en Google Sheets!', 'success');
            form.reset();

            // Feedback extra en el botón
            const btn = document.querySelector('.btn-submit');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '✓ REGISTRADO';
            setTimeout(() => {
                btn.innerHTML = originalHTML;
            }, 2000);

        } catch (error) {
            console.error('Error de conexión:', error);
            showMessage('❌ Error al guardar. Verifica la URL del script.', 'error');
        } finally {
            spinner.classList.remove('active');
        }
    });

    // Efecto sutil en inputs al focus (solo visual)
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('focus', () => {
            input.parentElement.style.transform = 'scale(1.01)';
        });
        input.addEventListener('blur', () => {
            input.parentElement.style.transform = 'scale(1)';
        });
    });
</script>

</body>
</html>
