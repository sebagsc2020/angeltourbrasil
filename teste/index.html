<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Angel Tour Brasil | Booking Form</title>
    <style>
        /* ===== RESET Y ESTILOS BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0B1120 0%, #192132 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            color: #E2E8F0;
            transition: background 0.3s ease;
        }

        /* ===== MODO OSCURO / CLARO ===== */
        body.light-mode {
            background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
            color: #0F172A;
        }

        body.light-mode .container {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(14, 165, 233, 0.3);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.15);
        }

        body.light-mode h2 {
            background: linear-gradient(135deg, #0F172A, #1E293B);
            background-clip: text;
            -webkit-background-clip: text;
        }

        body.light-mode .subtitle,
        body.light-mode label,
        body.light-mode .footer {
            color: #334155;
        }

        body.light-mode input {
            background: #FFFFFF;
            border-color: #CBD5E1;
            color: #0F172A;
        }

        body.light-mode input:focus {
            border-color: #0EA5E9;
            background: #FFFFFF;
        }

        body.light-mode .input-icon {
            color: #94A3B8;
        }

        body.light-mode .btn-language,
        body.light-mode .btn-admin {
            background: rgba(0, 0, 0, 0.05);
            border-color: #CBD5E1;
            color: #0F172A;
        }

        body.light-mode .btn-language:hover,
        body.light-mode .btn-admin:hover {
            background: #0EA5E9;
            border-color: #0EA5E9;
            color: white;
        }

        /* Contenedor principal */
        .container {
            max-width: 520px;
            width: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(56, 189, 248, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px -12px rgba(0, 0, 0, 0.6);
        }

        /* Botón de modo oscuro */
        .theme-toggle-card {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 40px;
            padding: 8px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #E2E8F0;
            transition: all 0.2s ease;
            z-index: 10;
        }

        body.light-mode .theme-toggle-card {
            background: rgba(0, 0, 0, 0.05);
            color: #0F172A;
            border-color: #CBD5E1;
        }

        .theme-toggle-card:hover {
            background: rgba(14, 165, 233, 0.2);
            transform: scale(1.02);
        }

        /* Header con logo */
        .header {
            padding: 2rem 2rem 1rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(56, 189, 248, 0.2);
        }

        .logo-container {
            margin-bottom: 1.2rem;
            display: flex;
            justify-content: center;
        }

        .logo-image {
            max-width: 180px;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
            transition: filter 0.3s ease;
        }

        body.light-mode .logo-image {
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.1));
        }

        h2 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #60A5FA);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: #94A3B8;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.2px;
            line-height: 1.4;
        }

        /* ===== BARRA DE BOTONES: IDIOMA IZQUIERDA + ADMIN DERECHA ===== */
        .actions-bar {
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(56, 189, 248, 0.15);
        }

        /* Botones de idioma (izquierda) */
        .language-bar {
            display: flex;
            gap: 0.6rem;
        }

        .btn-language {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.25);
            border-radius: 50px;
            width: 40px;
            height: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            overflow: hidden;
        }

        .btn-language img {
            width: 26px;
            height: 26px;
            object-fit: contain;
            transition: transform 0.2s ease;
        }

        .btn-language:hover {
            background: #0EA5E9;
            border-color: #0EA5E9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .btn-language.active {
            background: #0EA5E9;
            border-color: #0EA5E9;
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.4);
            transform: scale(1.02);
        }

        /* Botón Admin (derecha) */
        .btn-admin {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.25);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #E2E8F0;
            font-family: inherit;
        }

        .btn-admin img {
            width: 22px;
            height: 22px;
            object-fit: contain;
            border-radius: 4px;
        }

        .btn-admin:hover {
            background: #0EA5E9;
            border-color: #0EA5E9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
            color: white;
        }

        /* ===== FORMULARIO ===== */
        .form-wrapper {
            padding: 1.5rem 2rem 2rem 2rem;
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94A3B8;
            margin-bottom: 0.6rem;
        }

        .label-icon {
            font-size: 1rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #64748B;
            font-size: 1.1rem;
            pointer-events: none;
            z-index: 1;
        }

        input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: #0F172A;
            border: 1.5px solid #1E293B;
            border-radius: 1rem;
            font-size: 0.95rem;
            color: #F1F5F9;
            font-family: 'Poppins', monospace;
            transition: all 0.2s ease;
        }

        input[type="date"] {
            cursor: pointer;
            color-scheme: dark;
            text-transform: uppercase;
        }

        body.light-mode input[type="date"] {
            color-scheme: light;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            filter: invert(0.7);
            position: absolute;
            right: 1rem;
        }

        body.light-mode input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.2);
        }

        input:focus {
            outline: none;
            border-color: #0EA5E9;
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
            background: #111827;
        }

        input::placeholder {
            color: #475569;
            font-weight: 400;
            font-size: 0.9rem;
        }

        /* Botón principal */
        .btn-submit {
            width: 100%;
            background: linear-gradient(95deg, #0EA5E9, #3B82F6);
            border: none;
            padding: 1rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 0.8rem;
            font-family: inherit;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.4);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* Mensajes */
        .message {
            margin-top: 1.5rem;
            padding: 0.9rem;
            border-radius: 1rem;
            text-align: center;
            display: none;
            font-size: 0.85rem;
            font-weight: 500;
            backdrop-filter: blur(8px);
            animation: fadeSlide 0.3s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success {
            background: rgba(16, 185, 129, 0.15);
            color: #34D399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .error {
            background: rgba(239, 68, 68, 0.15);
            color: #F87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Spinner */
        .spinner {
            display: none;
            text-align: center;
            margin-top: 1.5rem;
        }

        .spinner.active {
            display: block;
        }

        .spinner-circle {
            width: 36px;
            height: 36px;
            border: 3px solid #1E293B;
            border-top-color: #0EA5E9;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            padding: 1rem 2rem;
            text-align: center;
            border-top: 1px solid rgba(56, 189, 248, 0.15);
            font-size: 0.7rem;
            color: #64748B;
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            background: rgba(0, 0, 0, 0.2);
        }

        body.light-mode .footer {
            background: rgba(0, 0, 0, 0.03);
            border-top-color: #CBD5E1;
        }

        .footer span {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .container {
                border-radius: 1.5rem;
            }
            .form-wrapper {
                padding: 1.2rem 1.5rem 1.5rem;
            }
            .header {
                padding: 1.5rem 1.5rem 0.8rem;
            }
            h2 {
                font-size: 1.6rem;
            }
            .subtitle {
                font-size: 0.7rem;
            }
            .theme-toggle-card {
                top: 12px;
                right: 12px;
                padding: 5px 10px;
                font-size: 11px;
            }
            .logo-image {
                max-width: 140px;
            }
            .btn-language {
                width: 36px;
                height: 36px;
            }
            .btn-language img {
                width: 22px;
                height: 22px;
            }
            .btn-admin {
                padding: 0.3rem 0.8rem;
                font-size: 0.7rem;
            }
            .btn-admin img {
                width: 18px;
                height: 18px;
            }
            .actions-bar {
                padding: 0.6rem 1.2rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Botón de modo oscuro -->
    <div class="theme-toggle-card" id="themeToggleCard">
        <span id="themeIcon">🌙</span>
        <span id="themeText">Modo oscuro</span>
    </div>

    <div class="header">
        <div class="logo-container">
            <img src="https://sebagsc2020.github.io/angeltourbrasil/images/logoangel.png" alt="Angel Tour Brasil Logo" class="logo-image">
        </div>
        <h2>Angel Tour Brasil</h2>
        <div class="subtitle" id="subtitleText">
            Book your boat tour · Limited spots · Instant confirmation
        </div>
    </div>

    <!-- BARRA DE ACCIONES: IDIOMAS IZQUIERDA + ADMIN DERECHA -->
    <div class="actions-bar">
        <div class="language-bar">
            <button class="btn-language" data-lang="es" title="Español">
                <img src="https://sebagsc2020.github.io/angeltourbrasil/images/bt-es.png" alt="Español">
            </button>
            <button class="btn-language" data-lang="pt" title="Português">
                <img src="https://sebagsc2020.github.io/angeltourbrasil/images/bt-pt.png" alt="Português">
            </button>
            <button class="btn-language" data-lang="en" title="English">
                <img src="https://sebagsc2020.github.io/angeltourbrasil/images/bt-us.png" alt="English">
            </button>
        </div>
        
        <button class="btn-admin" id="adminBtn">
            <img src="https://sebagsc2020.github.io/angeltourbrasil/images/logoangel.png" alt="Admin Logo">
            Admin
        </button>
    </div>

    <!-- FORMULARIO -->
    <div class="form-wrapper">
        <form id="dataForm">
            <div class="form-group">
                <label id="labelFecha">
                    <span class="label-icon">📅</span>
                    <span id="textFecha">TOUR DATE</span>
                </label>
                <div class="input-wrapper">
                    <span class="input-icon">📅</span>
                    <input type="date" id="fecha" name="fecha" required>
                </div>
            </div>

            <div class="form-group">
                <label id="labelNombre">
                    <span class="label-icon">👤</span>
                    <span id="textNombre">FULL NAME</span>
                </label>
                <div class="input-wrapper">
                    <span class="input-icon">👤</span>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ex: Carlos Silva" autocomplete="name">
                </div>
            </div>

            <div class="form-group">
                <label id="labelNumero">
                    <span class="label-icon">🔢</span>
                    <span id="textNumero">NUMBER / VALUE</span>
                </label>
                <div class="input-wrapper">
                    <span class="input-icon">#</span>
                    <input type="number" id="numero" name="numero" required placeholder="Ex: 42" step="any">
                </div>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-linecap="round"/>
                </svg>
                <span id="btnText">SEND YOUR RESERVATION</span>
            </button>
        </form>

        <div id="message" class="message"></div>
        <div id="spinner" class="spinner">
            <div class="spinner-circle"></div>
        </div>
    </div>

    <div class="footer">
        <span>⛵ <span id="footerBoat">Boat tours</span></span>
        <span>🔒 <span id="footerSecure">Secure data</span></span>
        <span>⚡ <span id="footerConfirm">Instant confirmation</span></span>
    </div>
</div>

<script>
    // ============================================================
    // ⚠️ IMPORTANTE: Reemplaza con la URL de tu Google Apps Script
    // ============================================================
    const scriptURL = 'https://script.google.com/macros/s/AKfycby_WZjxJ3k7zaRLy8RebHswsZMiWBGU6O1aL809dKjJmoW8DAymiGjT7inHe74vrCTTeQ/exec';

    // ===== DICCIONARIO DE IDIOMAS =====
    const translations = {
        es: {
            subtitle: "Reserve seu passeio de barco · Cupos limitados · Confirmación inmediata",
            fecha: "FECHA DEL PASEO",
            nombre: "NOMBRE COMPLETO",
            numero: "NÚMERO / VALOR",
            btn: "ENVIANDO TU RESERVA",
            placeholder_nombre: "Ej: Carlos Silva",
            placeholder_numero: "Ej: 42",
            footer_boat: "Paseos en barco",
            footer_secure: "Datos seguros",
            footer_confirm: "Confirmación inmediata",
            success: "✅ ¡Reserva enviada exitosamente! Los datos han sido guardados.",
            error_fields: "❌ Por favor completa todos los campos",
            error_date: "❌ Por favor selecciona una fecha para el paseo",
            error_number: "❌ Ingresa un número válido",
            btn_success: "✓ RESERVA ENVIADA"
        },
        pt: {
            subtitle: "Reserve seu passeio de barco · Vagas limitadas · Confirmação imediata",
            fecha: "DATA DO PASSEIO",
            nombre: "NOME COMPLETO",
            numero: "NÚMERO / VALOR",
            btn: "ENVIANDO SUA RESERVA",
            placeholder_nombre: "Ex: Carlos Silva",
            placeholder_numero: "Ex: 42",
            footer_boat: "Passeios de barco",
            footer_secure: "Dados seguros",
            footer_confirm: "Confirmação imediata",
            success: "✅ Reserva enviada com sucesso! Os dados foram salvos.",
            error_fields: "❌ Por favor, preencha todos os campos",
            error_date: "❌ Por favor, selecione uma data para o passeio",
            error_number: "❌ Digite um número válido",
            btn_success: "✓ RESERVA ENVIADA"
        },
        en: {
            subtitle: "Book your boat tour · Limited spots · Instant confirmation",
            fecha: "TOUR DATE",
            nombre: "FULL NAME",
            numero: "NUMBER / VALUE",
            btn: "SEND YOUR RESERVATION",
            placeholder_nombre: "Ex: Carlos Silva",
            placeholder_numero: "Ex: 42",
            footer_boat: "Boat tours",
            footer_secure: "Secure data",
            footer_confirm: "Instant confirmation",
            success: "✅ Reservation successfully sent! Data has been saved.",
            error_fields: "❌ Please complete all fields",
            error_date: "❌ Please select a date for the tour",
            error_number: "❌ Enter a valid number",
            btn_success: "✓ RESERVATION SENT"
        }
    };

    let currentLang = 'en';

    // Elementos del DOM
    const form = document.getElementById('dataForm');
    const messageDiv = document.getElementById('message');
    const spinner = document.getElementById('spinner');
    const fechaInput = document.getElementById('fecha');
    const nombreInput = document.getElementById('nombre');
    const numeroInput = document.getElementById('numero');

    // Configurar fecha mínima (hoy)
    const today = new Date().toISOString().split('T')[0];
    fechaInput.setAttribute('min', today);

    // ===== FUNCIÓN PARA CAMBIAR IDIOMA =====
    function changeLanguage(lang) {
        currentLang = lang;
        const t = translations[lang];
        
        document.getElementById('subtitleText').textContent = t.subtitle;
        document.getElementById('textFecha').textContent = t.fecha;
        document.getElementById('textNombre').textContent = t.nombre;
        document.getElementById('textNumero').textContent = t.numero;
        document.getElementById('btnText').textContent = t.btn;
        document.getElementById('footerBoat').textContent = t.footer_boat;
        document.getElementById('footerSecure').textContent = t.footer_secure;
        document.getElementById('footerConfirm').textContent = t.footer_confirm;
        
        nombreInput.placeholder = t.placeholder_nombre;
        numeroInput.placeholder = t.placeholder_numero;
        
        document.querySelectorAll('.btn-language').forEach(btn => {
            btn.classList.remove('active');
            if (btn.getAttribute('data-lang') === lang) {
                btn.classList.add('active');
            }
        });
        
        localStorage.setItem('preferred_language', lang);
    }

    // ===== EVENTOS DE LOS BOTONES DE IDIOMA =====
    document.querySelectorAll('.btn-language').forEach(btn => {
        btn.addEventListener('click', () => {
            const lang = btn.getAttribute('data-lang');
            changeLanguage(lang);
        });
    });

    // ===== BOTÓN ADMIN =====
    document.getElementById('adminBtn').addEventListener('click', () => {
        // Reemplaza con la URL de tu panel de administración
        window.open('https://docs.google.com/spreadsheets/d/TU_ID_DE_SHEET/edit', '_blank');
    });

    // ===== MODO OSCURO/CLARO =====
    function initTheme() {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
            document.body.classList.add('light-mode');
            updateThemeUI(false);
        } else {
            document.body.classList.remove('light-mode');
            updateThemeUI(true);
        }
    }
    
    function updateThemeUI(isDark) {
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');
        if (isDark) {
            themeIcon.textContent = '☀️';
            themeText.textContent = 'Modo claro';
        } else {
            themeIcon.textContent = '🌙';
            themeText.textContent = 'Modo oscuro';
        }
    }
    
    function toggleTheme() {
        const isLight = document.body.classList.toggle('light-mode');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        updateThemeUI(!isLight);
    }
    
    document.getElementById('themeToggleCard').addEventListener('click', toggleTheme);
    
    // ===== CARGAR IDIOMA GUARDADO =====
    const savedLang = localStorage.getItem('preferred_language');
    if (savedLang && translations[savedLang]) {
        changeLanguage(savedLang);
    } else {
        changeLanguage('en');
    }
    
    initTheme();

    // ===== FUNCIONALIDAD DEL FORMULARIO CORREGIDA =====
    function showMessage(msg, type) {
        messageDiv.textContent = msg;
        messageDiv.className = `message ${type}`;
        messageDiv.style.display = 'block';

        setTimeout(() => {
            if (messageDiv.style.display === 'block') {
                messageDiv.style.opacity = '0';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                    messageDiv.style.opacity = '1';
                }, 300);
            }
        }, 4500);
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // OBTENER LOS VALORES ACTUALES DE LOS CAMPOS
        const fecha = fechaInput.value;  // formato YYYY-MM-DD
        const nombre = nombreInput.value.trim();
        const numero = numeroInput.value;
        const t = translations[currentLang];

        // VALIDACIONES
        if (!fecha) {
            showMessage(t.error_date, 'error');
            return;
        }
        if (!nombre) {
            showMessage(t.error_fields, 'error');
            return;
        }
        if (numero === '' || isNaN(numero)) {
            showMessage(t.error_number, 'error');
            return;
        }

        // Mostrar spinner y ocultar mensaje anterior
        messageDiv.style.display = 'none';
        spinner.classList.add('active');

        // CREAR FormData Y AGREGAR LOS TRES CAMPOS
        const formData = new FormData();
        formData.append('fecha', fecha);      // ← CLAVE CORRECTA: 'fecha'
        formData.append('nombre', nombre);    // ← CLAVE CORRECTA: 'nombre'
        formData.append('numero', numero);    // ← CLAVE CORRECTA: 'numero'

        // Mostrar en consola para depuración (opcional)
        console.log('Enviando:', { fecha, nombre, numero });

        try {
            // ENVIAR A GOOGLE APPS SCRIPT
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            });

            // Mensaje de éxito (el modo 'no-cors' no permite leer respuesta)
            showMessage(t.success, 'success');
            form.reset();

            // Feedback visual en el botón
            const btn = document.querySelector('.btn-submit');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M5 13l4 4L19 7" stroke="currentColor" stroke-linecap="round"/>
                            </svg>
                            <span>${t.btn_success}</span>`;
            setTimeout(() => {
                btn.innerHTML = originalHTML;
            }, 2000);

        } catch (error) {
            console.error('Error de conexión:', error);
            showMessage('❌ Error de conexión. Verifica tu conexión o la URL del script.', 'error');
        } finally {
            spinner.classList.remove('active');
        }
    });

    // Efecto visual en inputs
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.addEventListener('focus', () => {
            input.parentElement.style.transform = 'scale(1.01)';
        });
        input.addEventListener('blur', () => {
            input.parentElement.style.transform = 'scale(1)';
        });
    });
</script>

</body>
</html>
