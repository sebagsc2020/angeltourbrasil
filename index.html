<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Angel Tour Brasil | Reservas Náuticas</title>
    <meta name="theme-color" content="#1e6f5c">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.15/index.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #1e6f5c;
            --primary-hover: #155a4a;
            --primary-light: #d1fae5;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --radius: 12px;
            --radius-sm: 8px;
        }
        body.dark-mode {
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 32px; }
        .logo-area { text-align: center; margin-bottom: 20px; }
        .logo-area img { height: 80px; width: auto; margin-bottom: 10px; }
        .logo-area h1 { font-size: 24px; margin-top: 5px; }
        
        .form-card { background: var(--bg-surface); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-body); color: var(--text-main); font-family: inherit; font-size: 14px; transition: border-color 0.2s; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 10px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: var(--bg-surface); color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        
        /* Header del formulario con título y botones en la misma línea */
        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .form-header h3 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }
        .header-buttons {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .admin-btn-inline {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 16px 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .admin-btn-inline:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }
        .admin-logo {
            height: 22px;
            width: auto;
            border-radius: 50%;
        }
        .theme-btn-inline {
            background: var(--bg-surface);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .theme-btn-inline:hover {
            background: var(--bg-body);
            transform: translateY(-1px);
        }
        
        /* Selector de horarios - solo preferencia, sin cupos */
        .horario-selector {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }
        .horario-option {
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-body);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .horario-option:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            transform: translateX(4px);
        }
        .horario-option.selected {
            border-color: var(--primary);
            background: var(--primary-light);
            box-shadow: 0 0 0 2px var(--primary);
        }
        .horario-icon {
            font-size: 24px;
            min-width: 40px;
            text-align: center;
        }
        .horario-info {
            flex: 1;
        }
        .horario-nombre {
            font-weight: 700;
            font-size: 15px;
            color: var(--text-main);
        }
        .horario-hora {
            font-size: 12px;
            color: var(--text-muted);
        }
        .horario-radio {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }
        
        .table-section { background: var(--bg-surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); overflow: hidden; }
        .section-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: left; padding: 14px 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); background: var(--bg-body); border-bottom: 1px solid var(--border-color); }
        td { padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-size: 14px; vertical-align: middle; }
        tr:hover td { background: rgba(30, 111, 92, 0.02); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
        .badge-confirmado { background: var(--success-light); color: #047857; }
        .client-avatar-sm { width: 28px; height: 28px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; margin-right: 8px; vertical-align: middle; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1f2937; color: white; padding: 12px 24px; border-radius: 40px; z-index: 1000; display: none; }
        .reservations-layout { display: grid; grid-template-columns: 380px 1fr; gap: 28px; align-items: start; }
        @media (max-width: 1024px) { .reservations-layout { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { 
            .form-row { grid-template-columns: 1fr; } 
            .container { padding: 20px; } 
            .form-header { flex-direction: column; align-items: flex-start; }
            .horario-option { padding: 10px 12px; }
            .horario-icon { font-size: 20px; min-width: 32px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <img src="https://sebagsc2020.github.io/angeltourbrasil/images/logoangel.png" alt="Angel Tour Brasil">
            <h1>Angel Tour Brasil</h1>
            <p style="color: var(--text-muted);">Reserve seu passeio de barco · Cupos limitados · Confirmación inmediata</p>
        </div>

        <div class="reservations-layout">
            <div class="form-card">
                <div class="form-header">
                    <h3><i class="ph ph-plus-circle" style="color:var(--primary);"></i> Nueva Reserva</h3>
                    <div class="header-buttons">
                        <button class="theme-btn-inline" id="themeBtnInline" onclick="toggleTheme()">
                            <i class="ph ph-moon" id="themeIconInline"></i>
                        </button>
                        <button class="admin-btn-inline" onclick="window.location.href='login.html'">
                            <img src="https://sebagsc2020.github.io/angeltourbrasil/images/logoangel.png" alt="Admin" class="admin-logo">
                            Admin
                        </button>
                    </div>
                </div>
                <form id="reservaForm" onsubmit="event.preventDefault(); guardarReserva();">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nombre Completo</label>
                            <input type="text" id="nombre" class="form-control" required placeholder="Ej: Juan Pérez">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" class="form-control" required placeholder="juan@empresa.com">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Empresa</label>
                            <input type="text" id="empresa" class="form-control" placeholder="Opcional">
                        </div>
                        <div class="form-group">
                            <label>Dia de Paseo</label>
                            <input type="date" id="fechaOut" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Pax</label>
                        <input type="number" id="pax" class="form-control" min="1" value="1" required>
                    </div>
                    <div class="form-group">
                        <label>Hotel / Dirección</label>
                        <input type="text" id="hotel" class="form-control" placeholder="Ej: Resort Costa do Sauípe">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp (código país)</label>
                        <input type="tel" id="whatsapp" class="form-control" placeholder="+55 11 91234-5678">
                    </div>
                    <div class="form-group">
                        <label>Selecciona tu horario de preferencia</label>
                        <div class="horario-selector" id="horarioSelector">
                            <div class="horario-option" data-horario="morning" onclick="seleccionarHorario(this)">
                                <div class="horario-icon">🌅</div>
                                <div class="horario-info">
                                    <div class="horario-nombre">Tour Mañana</div>
                                    <div class="horario-hora">Salida: 09:30 Hs</div>
                                </div>
                                <div class="horario-radio"></div>
                            </div>
                            <div class="horario-option" data-horario="mid" onclick="seleccionarHorario(this)">
                                <div class="horario-icon">🌤️</div>
                                <div class="horario-info">
                                    <div class="horario-nombre">Tour Media Mañana</div>
                                    <div class="horario-hora">Salida: 11:10 Hs</div>
                                </div>
                                <div class="horario-radio"></div>
                            </div>
                            <div class="horario-option" data-horario="afternoon" onclick="seleccionarHorario(this)">
                                <div class="horario-icon">🌇</div>
                                <div class="horario-info">
                                    <div class="horario-nombre">Tour Tarde</div>
                                    <div class="horario-hora">Salida: 13:30 Hs</div>
                                </div>
                                <div class="horario-radio"></div>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px; padding:12px;"><i class="ph ph-check-fat"></i> Confirmar Reserva</button>
                </form>
            </div>
            <div class="table-section">
                <div class="section-header">
                    <h3 style="font-size:16px; font-weight:600;">Reservas Recientes</h3>
                    <button class="btn btn-secondary btn-sm" onclick="cargarReservasRecientes()"><i class="ph ph-arrows-clockwise"></i> Actualizar</button>
                </div>
                <div class="table-responsive">
                    <table id="reservasRecientesTable">
                        <thead><tr><th>ID</th><th>Cliente</th><th>Empresa</th><th>Fecha</th><th>Horario</th><th>Pax</th><th>Estado</th></tr></thead>
                        <tbody id="reservasRecientesBody"><tr><td colspan="7" style="text-align:center;">Cargando...<\/td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbyO3Z6DGTznI3Rl2cdfHRTypmt-adE22_y_9Fuzc5cnVAXAILHYFpc6GlJpeKK3rKTM_g/exec";
        const SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTAuEiFi8pDWKqQlsYh5mhMuSZxEojyaM5Vcg-FyBqyCu4FGXFECi5FqhWV4w46oHDcWQSRDxBf4nfm/pubhtml";
        
        let horarioSeleccionado = null;
        
        function mostrarToast(mensaje, error = false) {
            const toast = document.getElementById('toast');
            toast.textContent = mensaje;
            toast.style.background = error ? '#dc2626' : '#1f2937';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }
        
        async function cargarReservasRecientes() {
            try {
                const proxyUrl = 'https://api.allorigins.win/raw?url=';
                const response = await fetch(proxyUrl + encodeURIComponent(SHEETS_URL));
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const tables = doc.getElementsByTagName('table');
                if (tables.length === 0) return;
                const rows = tables[0].getElementsByTagName('tr');
                
                const reservasRecientes = [];
                
                for (let i = 1; i < rows.length; i++) {
                    const cells = rows[i].getElementsByTagName('td');
                    if (cells.length >= 7) {
                        const horario = cells[6]?.textContent?.trim() || '';
                        let horarioMostrar = horario;
                        if (horario === "Tour Mañana (09:30)") horarioMostrar = "🌅 09:30";
                        else if (horario === "Tour Media Mañana (11:10)") horarioMostrar = "🌤️ 11:10";
                        else if (horario === "Tour Tarde (13:30)") horarioMostrar = "🌇 13:30";
                        
                        reservasRecientes.push({
                            id: cells[0]?.textContent?.trim() || '',
                            nombre: cells[2]?.textContent?.trim() || '',
                            empresa: cells[3]?.textContent?.trim() || '',
                            fecha: cells[1]?.textContent?.trim() || '',
                            horario: horarioMostrar,
                            pax: parseInt(cells[4]?.textContent?.trim()) || 0,
                            estado: cells[11]?.textContent?.trim() || 'Confirmado'
                        });
                    }
                }
                
                const tbody = document.getElementById('reservasRecientesBody');
                tbody.innerHTML = reservasRecientes.slice(0, 8).reverse().map(r => `
                    <tr>
                        <td style="font-family:monospace;">${r.id}<\/td>
                        <td><div style="display:flex; align-items:center;"><div class="client-avatar-sm">${r.nombre.charAt(0)}</div>${r.nombre}<\/div><\/td>
                        <td>${r.empresa || 'N/A'}<\/td>
                        <td>${r.fecha}<\/td>
                        <td>${r.horario}<\/td>
                        <td>${r.pax}<\/td>
                        <td><span class="badge badge-confirmado">${r.estado}<\/span><\/td>
                    </tr>
                `).join('');
                
            } catch(e) { console.error("Error:", e); }
        }
        
        function seleccionarHorario(element) {
            document.querySelectorAll('.horario-option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            horarioSeleccionado = element.getAttribute('data-horario');
        }
        
        async function guardarReserva() {
            const nombre = document.getElementById('nombre').value.trim();
            const email = document.getElementById('email').value.trim();
            const empresa = document.getElementById('empresa').value.trim();
            const fechaOut = document.getElementById('fechaOut').value;
            const pax = parseInt(document.getElementById('pax').value) || 0;
            const hotel = document.getElementById('hotel').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            
            if (!nombre || !email || !fechaOut) {
                mostrarToast('Complete los campos obligatorios', true);
                return;
            }
            if (!horarioSeleccionado) {
                mostrarToast('Seleccione un horario', true);
                return;
            }
            if (pax === 0) {
                mostrarToast('Ingrese al menos un pasajero', true);
                return;
            }
            
            let horarioTexto = '';
            if (horarioSeleccionado === 'morning') { 
                horarioTexto = 'Tour Mañana (09:30)';
            } else if (horarioSeleccionado === 'mid') { 
                horarioTexto = 'Tour Media Mañana (11:10)';
            } else { 
                horarioTexto = 'Tour Tarde (13:30)';
            }
            
            const id = `ATB-${Date.now()}-${Math.floor(Math.random()*1000)}`;
            const montoTotal = pax * 180;
            const datosReserva = { 
                id, 
                fecha_paseo: fechaOut, 
                nombre, 
                empresa, 
                adultos: pax, 
                menores: 0, 
                horario: horarioTexto, 
                monto_total: montoTotal, 
                hotel, 
                email, 
                whatsapp 
            };
            
            try {
                const response = await fetch(GOOGLE_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(datosReserva) });
                const resultado = await response.json();
                
                if (resultado.success) {
                    mostrarToast('✅ Reserva confirmada');
                    document.getElementById('reservaForm').reset();
                    document.getElementById('pax').value = '1';
                    document.querySelectorAll('.horario-option').forEach(opt => opt.classList.remove('selected'));
                    horarioSeleccionado = null;
                    await cargarReservasRecientes();
                    
                    const mensajeWhatsApp = `🛥️ *ANGEL TOUR BRASIL* - RESERVA CONFIRMADA%0A%0ANombre: ${nombre}%0AHotel: ${hotel}%0AEmail: ${email}%0AWhatsApp: ${whatsapp}%0AEmpresa: ${empresa}%0AFecha: ${fechaOut}%0AHorario: ${horarioTexto}%0APasajeros: ${pax}%0ACódigo: ${id}%0ATotal: R$ ${montoTotal}`;
                    if (whatsapp) window.open(`https://wa.me/${whatsapp.replace(/\D/g, '')}?text=${encodeURIComponent(mensajeWhatsApp)}`, '_blank');
                } else {
                    mostrarToast('Error al guardar la reserva', true);
                }
            } catch(e) { 
                console.error("Error:", e);
                mostrarToast('Error de conexión', true); 
            }
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            const iconInline = document.getElementById('themeIconInline');
            if (document.body.classList.contains('dark-mode')) {
                iconInline.className = 'ph ph-sun';
            } else {
                iconInline.className = 'ph ph-moon';
            }
        }
        
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-mode');
            const iconInline = document.getElementById('themeIconInline');
            if (iconInline) iconInline.className = 'ph ph-sun';
        }
        
        document.getElementById('fechaOut').min = new Date().toISOString().split('T')[0];
        cargarReservasRecientes();
    </script>
</body>
</html>
