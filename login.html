<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Acceso Administrador | Angel Tour Brasil</title>
    <meta name="theme-color" content="#1e6f5c">
    <!-- Prevenir que el navegador guarde la contraseña en caché -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.15/index.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Prevenir selección de texto y clic derecho */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        :root {
            --primary: #1e6f5c;
            --primary-hover: #155a4a;
            --primary-light: #d1fae5;
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --radius: 12px;
            --radius-sm: 8px;
        }
        body.dark-mode {
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2b3e 0%, #0d3b4f 50%, #115e6b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s;
        }
        body.dark-mode {
            background: linear-gradient(135deg, #0a1a2a 0%, #0a2a35 50%, #0d3b4f 100%);
        }
        .login-container {
            max-width: 480px;
            width: 100%;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card {
            background: var(--bg-surface);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            transition: background 0.3s, color 0.3s;
        }
        .login-header {
            background: linear-gradient(105deg, #0e4b5e 0%, #1b7a7a 100%);
            padding: 35px;
            text-align: center;
            color: white;
            position: relative;
        }
        .login-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .login-header p {
            font-size: 14px;
            opacity: 0.85;
        }
        .header-theme-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 40px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .header-theme-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.02);
        }
        .login-body {
            padding: 35px;
        }
        .input-group {
            margin-bottom: 24px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 14px;
            font-size: 15px;
            background: var(--bg-body);
            color: var(--text-main);
            transition: all 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30,111,92,0.15);
        }
        /* CAPTCHA simple */
        .captcha-group {
            margin-bottom: 20px;
        }
        .captcha-display {
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            font-family: monospace;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 8px;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .captcha-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }
        .btn-login {
            background: linear-gradient(95deg, #1e6f5c, #289672);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            text-align: center;
            margin-top: 20px;
            display: none;
        }
        .warning-msg {
            background: #fef3c7;
            color: #92400e;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            text-align: center;
            margin-top: 20px;
            display: none;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 11px;
        }
    </style>
</head>
<body>
    <!-- Prevenir clic derecho -->
    <script>
        // Prevenir clic derecho
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
        });
        
        // Prevenir atajos de teclado para herramientas de desarrollo
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
                (e.ctrlKey && e.key === 'u') ||
                (e.ctrlKey && e.key === 'U')) {
                e.preventDefault();
                return false;
            }
        });
        
        // Prevenir selección de texto
        document.addEventListener('selectstart', function(e) {
            e.preventDefault();
            return false;
        });
    </script>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>
                    <i class="ph ph-lock-simple"></i> Acceso Administrador
                    <button class="header-theme-btn" id="headerThemeBtn" onclick="toggleTheme()">
                        <i class="ph ph-moon" id="themeIcon"></i>
                    </button>
                </h2>
                <p>Sistema seguro · Acceso restringido</p>
            </div>
            <div class="login-body">
                <div class="input-group">
                    <label>Contraseña</label>
                    <input type="password" id="password" placeholder="Ingrese la contraseña" autocomplete="off">
                </div>
                <div class="captcha-group">
                    <label>Verificación de seguridad</label>
                    <div class="captcha-display" id="captchaDisplay">XXXX</div>
                    <input type="text" id="captchaInput" class="captcha-input" placeholder="Ingrese el código" autocomplete="off" maxlength="4">
                </div>
                <button class="btn-login" id="loginBtn" onclick="login()">
                    <i class="ph ph-sign-in"></i> Ingresar al Sistema
                </button>
                <div id="errorMsg" class="error-msg">
                    <i class="ph ph-warning-circle"></i> Contraseña o código incorrecto
                </div>
                <div id="warningMsg" class="warning-msg">
                    <i class="ph ph-warning"></i> Demasiados intentos. Espere 30 segundos.
                </div>
                <div class="back-link">
                    <a href="index.html">
                        <i class="ph ph-arrow-left"></i> Volver al formulario de reservas
                    </a>
                </div>
            </div>
        </div>
        <div class="footer-text">
            <i class="ph ph-shield-check"></i> Acceso restringido al personal autorizado
        </div>
    </div>

    <script>
        // Variables de seguridad
        let intentosFallidos = 0;
        let bloqueado = false;
        let timeoutBloqueo = null;
        
        // Generar CAPTCHA aleatorio
        function generarCaptcha() {
            const caracteres = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let captcha = '';
            for (let i = 0; i < 4; i++) {
                captcha += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
            }
            document.getElementById('captchaDisplay').textContent = captcha;
            return captcha;
        }
        
        let captchaActual = generarCaptcha();
        
        // Función para regenerar CAPTCHA
        function regenerarCaptcha() {
            captchaActual = generarCaptcha();
            document.getElementById('captchaInput').value = '';
        }
        
        // Click en el captcha para regenerar
        document.getElementById('captchaDisplay').addEventListener('click', function() {
            regenerarCaptcha();
        });
        
        // Contraseña de administrador
        const ADMIN_PASSWORD = "angel2026";
        
        function login() {
            const loginBtn = document.getElementById('loginBtn');
            const password = document.getElementById('password').value;
            const captchaInput = document.getElementById('captchaInput').value.toUpperCase();
            
            // Verificar si está bloqueado
            if (bloqueado) {
                document.getElementById('warningMsg').style.display = 'block';
                document.getElementById('errorMsg').style.display = 'none';
                return;
            }
            
            // Validar CAPTCHA
            if (captchaInput !== captchaActual) {
                intentosFallidos++;
                regenerarCaptcha();
                document.getElementById('password').value = '';
                document.getElementById('captchaInput').value = '';
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('warningMsg').style.display = 'none';
                
                // Bloquear después de 5 intentos fallidos
                if (intentosFallidos >= 5) {
                    bloqueado = true;
                    loginBtn.disabled = true;
                    document.getElementById('warningMsg').style.display = 'block';
                    document.getElementById('warningMsg').innerHTML = '<i class="ph ph-warning"></i> Demasiados intentos fallidos. Espere 30 segundos.';
                    document.getElementById('errorMsg').style.display = 'none';
                    
                    timeoutBloqueo = setTimeout(function() {
                        bloqueado = false;
                        intentosFallidos = 0;
                        loginBtn.disabled = false;
                        document.getElementById('warningMsg').style.display = 'none';
                        regenerarCaptcha();
                    }, 30000);
                }
                return;
            }
            
            // Validar contraseña
            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem("admin_logged", "true");
                sessionStorage.setItem("admin_login_time", Date.now());
                window.location.href = "reservas.html";
            } else {
                intentosFallidos++;
                regenerarCaptcha();
                document.getElementById('password').value = '';
                document.getElementById('captchaInput').value = '';
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('warningMsg').style.display = 'none';
                
                // Bloquear después de 5 intentos fallidos
                if (intentosFallidos >= 5) {
                    bloqueado = true;
                    loginBtn.disabled = true;
                    document.getElementById('warningMsg').style.display = 'block';
                    document.getElementById('warningMsg').innerHTML = '<i class="ph ph-warning"></i> Demasiados intentos fallidos. Espere 30 segundos.';
                    document.getElementById('errorMsg').style.display = 'none';
                    
                    timeoutBloqueo = setTimeout(function() {
                        bloqueado = false;
                        intentosFallidos = 0;
                        loginBtn.disabled = false;
                        document.getElementById('warningMsg').style.display = 'none';
                        regenerarCaptcha();
                    }, 30000);
                }
            }
        }
        
        // Permitir login con Enter
        document.getElementById("password").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                login();
            }
        });
        
        document.getElementById("captchaInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                login();
            }
        });
        
        // Modo oscuro
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            const icon = document.getElementById('themeIcon');
            const headerBtn = document.getElementById('headerThemeBtn');
            if (document.body.classList.contains('dark-mode')) {
                icon.className = 'ph ph-sun';
                headerBtn.innerHTML = '<i class="ph ph-sun"></i>';
            } else {
                icon.className = 'ph ph-moon';
                headerBtn.innerHTML = '<i class="ph ph-moon"></i>';
            }
        }
        
        // Cargar tema guardado
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            const icon = document.getElementById('themeIcon');
            const headerBtn = document.getElementById('headerThemeBtn');
            if (icon) icon.className = 'ph ph-sun';
            if (headerBtn) headerBtn.innerHTML = '<i class="ph ph-sun"></i>';
        }
        
        // Limpiar campos al cargar
        window.addEventListener('load', function() {
            document.getElementById('password').value = '';
            document.getElementById('captchaInput').value = '';
            regenerarCaptcha();
        });
    </script>
</body>
</html>
