<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gestión de Reservas | Angel Tour Brasil</title>
    <meta name="theme-color" content="#1e6f5c">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.15/index.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #1e6f5c;
            --primary-hover: #155a4a;
            --primary-light: #d1fae5;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --whatsapp: #25D366;
            --whatsapp-light: #d4f5e0;
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --radius: 12px;
            --radius-sm: 8px;
        }
        body.dark-mode {
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .logo-area img { height: 60px; width: auto; }
        .logo-area h1 { font-size: 24px; font-weight: 700; color: var(--text-main); }
        .logo-area h1 span { color: var(--primary); }
        
        .action-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 12px 24px;
            background: var(--bg-surface);
            border-radius: 60px;
            border: 1px solid var(--border-color);
            margin-bottom: 28px;
            box-shadow: var(--shadow-sm);
        }
        
        .floating-menu {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .menu-toggle {
            width: 42px;
            height: 42px;
            background: var(--primary);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 20px;
            transition: all 0.3s;
        }
        .menu-toggle:hover { background: var(--primary-hover); transform: scale(1.02); }
        .menu-dropdown {
            position: absolute;
            top: 50px;
            left: 0;
            background: var(--bg-surface);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            min-width: 200px;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .floating-menu.open .menu-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            border-bottom: 1px solid var(--border-color);
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: var(--primary-light); color: var(--primary); }
        .menu-item i { font-size: 18px; }
        .menu-item.logout {
            color: var(--danger);
            border-top: 1px solid var(--border-color);
            cursor: pointer;
        }
        .menu-item.logout:hover { background: var(--danger-light); color: var(--danger); }
        
        .action-btn {
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-secondary { background: var(--bg-surface); color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: var(--bg-body); }
        .btn-icon { width: 42px; height: 42px; border-radius: 40px; background: var(--bg-surface); border: 1px solid var(--border-color); color: var(--text-muted); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .btn-icon:hover { color: var(--primary); border-color: var(--primary); transform: scale(1.02); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 28px; }
        .stat-card { background: var(--bg-surface); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border-color); }
        .stat-card .stat-value { font-size: 28px; font-weight: 700; color: var(--primary); }
        .stat-card .stat-label { font-size: 13px; color: var(--text-muted); margin-top: 5px; }
        
        .search-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .search-input { flex: 1; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--bg-body); color: var(--text-main); font-size: 14px; }
        .search-input:focus { outline: none; border-color: var(--primary); }
        
        .table-container { background: var(--bg-surface); border-radius: var(--radius); border: 1px solid var(--border-color); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { text-align: left; padding: 16px 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); background: var(--bg-body); border-bottom: 1px solid var(--border-color); }
        td { padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-size: 14px; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(30, 111, 92, 0.03); }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
        .badge-confirmado { background: var(--success-light); color: #047857; }
        .badge-pendiente { background: var(--warning-light); color: #b45309; }
        .badge-cancelado { background: var(--danger-light); color: #b91c1c; }
        .dark-mode .badge-confirmado { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .dark-mode .badge-pendiente { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .dark-mode .badge-cancelado { background: rgba(239, 68, 68, 0.15); color: #f87171; }
        
        .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-sm { width: 34px; height: 34px; border-radius: 8px; background: transparent; border: 1px solid var(--border-color); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: var(--text-muted); transition: all 0.2s; font-size: 16px; }
        .btn-sm:hover { transform: scale(1.05); }
        .btn-edit:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
        .btn-delete:hover { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }
        .btn-whatsapp:hover { background: var(--whatsapp-light); color: var(--whatsapp); border-color: var(--whatsapp); }
        .btn-view:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-content { background: var(--bg-surface); border-radius: 24px; max-width: 500px; width: 90%; padding: 24px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .modal-header h3 { font-size: 18px; font-weight: 600; }
        .modal-body .form-group { margin-bottom: 16px; }
        .modal-body label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        .modal-body input, .modal-body select { width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 10px; background: var(--bg-body); color: var(--text-main); font-size: 14px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--border-color); }
        
        .view-modal-content { max-width: 600px; }
        .reserva-detalle { margin-bottom: 16px; padding: 12px; background: var(--bg-body); border-radius: 12px; }
        .reserva-detalle p { margin: 8px 0; }
        .reserva-detalle strong { color: var(--primary); }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1f2937; color: white; padding: 12px 24px; border-radius: 40px; z-index: 1000; display: none; }
        
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .action-bar { border-radius: 20px; gap: 12px; padding: 12px 16px; }
            .search-bar { flex-direction: column; }
            .search-input { width: 100%; }
            .action-buttons { flex-direction: row; }
            .btn-sm { width: 30px; height: 30px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-area">
                <img src="https://sebagsc2020.github.io/angeltourbrasil/images/logoangel.png" alt="Angel Tour Brasil">
                <h1>Angel Tour <span>Brasil</span></h1>
            </div>
            
            <div class="action-bar">
                <div class="floating-menu" id="floatingMenu">
                    <div class="menu-toggle" onclick="toggleMenu()">
                        <i class="ph ph-list"></i>
                    </div>
                    <div class="menu-dropdown">
                        <a href="reservas.html" class="menu-item">
                            <i class="ph ph-calendar-check"></i> Reservas
                        </a>
                        <a href="clientes.html" class="menu-item">
                            <i class="ph ph-users"></i> Gestión Clientes
                        </a>
                        <div class="menu-item logout" onclick="logout()">
                            <i class="ph ph-sign-out"></i> Cerrar Sesión
                        </div>
                    </div>
                </div>
                
                <div style="width: 1px; height: 30px; background: var(--border-color);"></div>
                
                <button class="btn-icon" id="themeBtn" onclick="toggleTheme()">
                    <i class="ph ph-moon" id="themeIcon"></i>
                </button>
                
                <button class="action-btn btn-secondary" onclick="cargarReservas()">
                    <i class="ph ph-arrows-clockwise"></i> Actualizar
                </button>
                
                <button class="action-btn btn-primary" onclick="exportarExcel()">
                    <i class="ph ph-download-simple"></i> Exportar
                </button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalReservas">0</div>
                <div class="stat-label">Total Reservas</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalPasajeros">0</div>
                <div class="stat-label">Total Pasajeros</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalIngresos">R$ 0</div>
                <div class="stat-label">Ingresos Totales</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="ocupacionMedia">0%</div>
                <div class="stat-label">Ocupación Media</div>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar por ID, cliente, empresa o horario..." onkeyup="filtrarReservas()">
        </div>

        <div class="table-container">
            <table id="reservasTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Fecha Paseo</th>
                        <th>Cliente</th>
                        <th>Empresa</th>
                        <th>Adultos</th>
                        <th>Menores</th>
                        <th>Horario</th>
                        <th>Total Pagantes</th>
                        <th>R$ Total</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="reservasTableBody">
                    <tr><td colspan="11" style="text-align:center;">Cargando reservas...<\/td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="ph ph-pencil-simple"></i> Editar Reserva</h3>
                <button class="btn-icon" onclick="cerrarModal()" style="width:32px;height:32px;"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Cliente</label>
                    <input type="text" id="editNombre" placeholder="Nombre completo">
                </div>
                <div class="form-group">
                    <label>Teléfono (WhatsApp)</label>
                    <input type="text" id="editWhatsapp" placeholder="Ej: 5511999999999">
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="editEstado">
                        <option value="Confirmado">Confirmado</option>
                        <option value="Pendiente">Pendiente</option>
                        <option value="Cancelado">Cancelado</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
                <button class="btn btn-primary" onclick="guardarEdicion()">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <div id="viewModal" class="modal">
        <div class="modal-content view-modal-content">
            <div class="modal-header">
                <h3><i class="ph ph-eye"></i> Detalle de Reserva</h3>
                <button class="btn-icon" onclick="cerrarViewModal()" style="width:32px;height:32px;"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body" id="viewModalBody">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="cerrarViewModal()">Cerrar</button>
                <button class="btn btn-primary" id="viewWhatsappBtn" onclick="enviarWhatsappDesdeView()">📱 Enviar por WhatsApp</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        if (!sessionStorage.getItem("admin_logged")) {
            window.location.href = "login.html";
        }

        const SPREADSHEET_ID = "1uOAcy1X8yMHDK03CUKLix4cUm_l4m3E4vaZHgSk33as";
        const PROXY_URL = "https://cors-anywhere.herokuapp.com/";
        const SHEETS_API = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json`;
        
        let reservasData = [];
        let currentViewReserva = null;
        
        function toggleMenu() {
            document.getElementById('floatingMenu').classList.toggle('open');
        }
        
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('floatingMenu');
            if (menu && !menu.contains(e.target) && menu.classList.contains('open')) {
                menu.classList.remove('open');
            }
        });
        
        function mostrarToast(mensaje, error = false) {
            const toast = document.getElementById('toast');
            toast.textContent = mensaje;
            toast.style.background = error ? '#dc2626' : '#1f2937';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }
        
        function parseMoneda(valor) {
            if (!valor) return 0;
            if (typeof valor === 'number') return valor;
            // Limpiar string: eliminar R$, espacios, cambiar coma por punto
            const limpio = String(valor).replace('R$', '').replace(/\./g, '').replace(',', '.').trim();
            const num = parseFloat(limpio);
            return isNaN(num) ? 0 : num;
        }
        
        async function cargarReservas() {
            try {
                mostrarToast('Cargando reservas...');
                
                const response = await fetch(PROXY_URL + SHEETS_API + '&t=' + Date.now());
                const text = await response.text();
                
                let jsonStr = text.replace("/*O_o*/", "").replace("google.visualization.Query.setResponse(", "").slice(0, -2);
                const data = JSON.parse(jsonStr);
                const rows = data.table.rows;
                
                if (!rows || rows.length === 0) {
                    mostrarToast("No se encontraron datos", true);
                    return;
                }
                
                reservasData = [];
                const startIndex = (rows[0]?.c[0]?.v === "ID") ? 1 : 0;
                
                for (let i = startIndex; i < rows.length; i++) {
                    const cells = rows[i].c;
                    if (!cells || cells.length < 10) continue;
                    
                    // Mapeo según tus columnas:
                    // 0: ID, 1: Fecha, 2: Nombre, 3: Empresa, 4: Email, 
                    // 5: H_Ref, 6: Adultos, 7: Menores, 8: Cortesía, 9: R$ Total, 10: Total Pagantes
                    const id = cells[0]?.v || '';
                    const fecha = cells[1]?.v || '';
                    const cliente = cells[2]?.v || '';
                    const empresa = cells[3]?.v || '';
                    const adultos = parseInt(cells[6]?.v) || 0;
                    const menores = parseInt(cells[7]?.v) || 0;
                    const horario = cells[5]?.v || '';
                    const totalPagantes = cells[10]?.v || (adultos + menores + " pagantes");
                    const montoRaw = cells[9]?.v || 0;
                    const monto = parseMoneda(montoRaw);
                    
                    if (!id && !cliente) continue;
                    
                    reservasData.push({
                        id: id,
                        fecha: fecha,
                        cliente: cliente,
                        empresa: empresa,
                        adultos: adultos,
                        menores: menores,
                        horario: horario,
                        totalPagantes: totalPagantes,
                        monto: monto,
                        estado: 'Confirmado',
                        whatsapp: ''
                    });
                }
                
                actualizarEstadisticas();
                renderizarTabla();
                mostrarToast(`✅ ${reservasData.length} reservas cargadas`);
                
            } catch(e) { 
                console.error("Error:", e);
                mostrarToast("Error al cargar reservas: " + e.message, true);
            }
        }
        
        function actualizarEstadisticas() {
            let totalPasajeros = 0;
            let totalIngresos = 0;
            reservasData.forEach(r => {
                totalPasajeros += (r.adultos || 0) + (r.menores || 0);
                totalIngresos += r.monto || 0;
            });
            document.getElementById('totalReservas').innerHTML = reservasData.length;
            document.getElementById('totalPasajeros').innerHTML = totalPasajeros;
            document.getElementById('totalIngresos').innerHTML = `R$ ${totalIngresos.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            let ocupacion = reservasData.length > 0 ? Math.min(100, Math.round((totalPasajeros / (reservasData.length * 4)) * 100)) : 0;
            document.getElementById('ocupacionMedia').innerHTML = `${ocupacion}%`;
        }
        
        function getBadgeClass(estado) {
            if (estado === 'Confirmado') return 'badge-confirmado';
            if (estado === 'Cancelado') return 'badge-cancelado';
            return 'badge-pendiente';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function formatMoney(value) {
            return `R$ ${(value || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
        }
        
        function renderizarTabla() {
            const tbody = document.getElementById('reservasTableBody');
            if (reservasData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;">No hay reservas para mostrar<\/td></tr>';
                return;
            }
            
            tbody.innerHTML = reservasData.map(r => `
                <tr>
                    <td style="font-family:monospace; font-size:12px;">${escapeHtml(r.id)}<\/td>
                    <td>${escapeHtml(r.fecha)}<\/td>
                    <td style="font-weight:500;">${escapeHtml(r.cliente)}<\/td>
                    <td>${escapeHtml(r.empresa) || '—'}<\/td>
                    <td>${r.adultos}<\/td>
                    <td>${r.menores}<\/td>
                    <td>${escapeHtml(r.horario)}<\/td>
                    <td>${escapeHtml(r.totalPagantes)}<\/td>
                    <td style="font-weight:600; color:var(--primary);">${formatMoney(r.monto)}<\/td>
                    <td><span class="badge ${getBadgeClass(r.estado)}">${r.estado}<\/span><\/td>
                    <td class="action-buttons">
                        <button class="btn-sm btn-edit" onclick="editarReserva('${escapeHtml(r.id)}')" title="Editar"><i class="ph ph-pencil-simple"></i><\/button>
                        <button class="btn-sm btn-delete" onclick="eliminarReserva('${escapeHtml(r.id)}')" title="Eliminar"><i class="ph ph-trash"></i><\/button>
                        <button class="btn-sm btn-whatsapp" onclick="enviarWhatsapp('${escapeHtml(r.id)}')" title="Enviar por WhatsApp"><i class="ph ph-whatsapp-logo"></i><\/button>
                        <button class="btn-sm btn-view" onclick="verEnLinea('${escapeHtml(r.id)}')" title="Ver en línea"><i class="ph ph-eye"></i><\/button>
                    <\/td>
                </tr>
            `).join('');
        }
        
        function filtrarReservas() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = reservasData.filter(r => 
                r.id.toLowerCase().includes(searchTerm) ||
                r.cliente.toLowerCase().includes(searchTerm) ||
                (r.empresa && r.empresa.toLowerCase().includes(searchTerm)) ||
                r.horario.toLowerCase().includes(searchTerm)
            );
            
            const tbody = document.getElementById('reservasTableBody');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;">No se encontraron resultados<\/td></tr>';
                return;
            }
            
            tbody.innerHTML = filtered.map(r => `
                <tr>
                    <td style="font-family:monospace; font-size:12px;">${escapeHtml(r.id)}<\/td>
                    <td>${escapeHtml(r.fecha)}<\/td>
                    <td style="font-weight:500;">${escapeHtml(r.cliente)}<\/td>
                    <td>${escapeHtml(r.empresa) || '—'}<\/td>
                    <td>${r.adultos}<\/td>
                    <td>${r.menores}<\/td>
                    <td>${escapeHtml(r.horario)}<\/td>
                    <td>${escapeHtml(r.totalPagantes)}<\/td>
                    <td style="font-weight:600; color:var(--primary);">${formatMoney(r.monto)}<\/td>
                    <td><span class="badge ${getBadgeClass(r.estado)}">${r.estado}<\/span><\/td>
                    <td class="action-buttons">
                        <button class="btn-sm btn-edit" onclick="editarReserva('${escapeHtml(r.id)}')" title="Editar"><i class="ph ph-pencil-simple"></i><\/button>
                        <button class="btn-sm btn-delete" onclick="eliminarReserva('${escapeHtml(r.id)}')" title="Eliminar"><i class="ph ph-trash"></i><\/button>
                        <button class="btn-sm btn-whatsapp" onclick="enviarWhatsapp('${escapeHtml(r.id)}')" title="Enviar por WhatsApp"><i class="ph ph-whatsapp-logo"></i><\/button>
                        <button class="btn-sm btn-view" onclick="verEnLinea('${escapeHtml(r.id)}')" title="Ver en línea"><i class="ph ph-eye"></i><\/button>
                    <\/td>
                </tr>
            `).join('');
        }
        
        let reservaEditando = null;
        
        function editarReserva(id) {
            reservaEditando = reservasData.find(r => r.id === id);
            if (reservaEditando) {
                document.getElementById('editId').value = reservaEditando.id;
                document.getElementById('editNombre').value = reservaEditando.cliente;
                document.getElementById('editWhatsapp').value = reservaEditando.whatsapp || '';
                document.getElementById('editEstado').value = reservaEditando.estado;
                document.getElementById('editModal').classList.add('active');
            }
        }
        
        function cerrarModal() {
            document.getElementById('editModal').classList.remove('active');
            reservaEditando = null;
        }
        
        function guardarEdicion() {
            if (!reservaEditando) return;
            
            reservaEditando.cliente = document.getElementById('editNombre').value;
            reservaEditando.whatsapp = document.getElementById('editWhatsapp').value;
            reservaEditando.estado = document.getElementById('editEstado').value;
            
            const index = reservasData.findIndex(r => r.id === reservaEditando.id);
            if (index !== -1) {
                reservasData[index] = {...reservaEditando};
                renderizarTabla();
                actualizarEstadisticas();
                mostrarToast('✅ Reserva actualizada localmente');
            }
            cerrarModal();
        }
        
        function eliminarReserva(id) {
            if (confirm('¿Está seguro de eliminar esta reserva?')) {
                reservasData = reservasData.filter(r => r.id !== id);
                renderizarTabla();
                actualizarEstadisticas();
                mostrarToast('🗑️ Reserva eliminada localmente');
            }
        }
        
        function enviarWhatsapp(id) {
            const reserva = reservasData.find(r => r.id === id);
            if (!reserva) return;
            
            let telefono = reserva.whatsapp;
            if (!telefono) {
                const nuevoTelefono = prompt('Ingrese el número de WhatsApp del cliente (código país + número):', '55');
                if (!nuevoTelefono) return;
                telefono = nuevoTelefono;
                reserva.whatsapp = telefono;
            }
            
            let numeroLimpio = telefono.replace(/\D/g, '');
            if (!numeroLimpio.startsWith('55')) {
                numeroLimpio = '55' + numeroLimpio;
            }
            
            const mensaje = `Hola ${reserva.cliente}, confirmamos tu reserva en *Angel Tour Brasil*:\n\n` +
                `📅 *Fecha:* ${reserva.fecha}\n` +
                `⏰ *Horario:* ${reserva.horario}\n` +
                `👥 *Adultos:* ${reserva.adultos}\n` +
                `🧒 *Menores:* ${reserva.menores}\n` +
                `👥 *Total Personas:* ${reserva.adultos + reserva.menores}\n` +
                `💰 *Monto Total:* ${formatMoney(reserva.monto)}\n` +
                `🆔 *ID:* ${reserva.id}\n\n` +
                `¡Gracias por confiar en nosotros! 🌊`;
            
            const url = `https://wa.me/${numeroLimpio}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
            mostrarToast(`📱 Abriendo WhatsApp para ${reserva.cliente}`);
        }
        
        function verEnLinea(id) {
            const reserva = reservasData.find(r => r.id === id);
            if (!reserva) return;
            
            currentViewReserva = reserva;
            
            const html = `
                <div class="reserva-detalle">
                    <p><strong>🆔 ID:</strong> ${escapeHtml(reserva.id)}</p>
                    <p><strong>📅 Fecha Paseo:</strong> ${escapeHtml(reserva.fecha)}</p>
                    <p><strong>👤 Cliente:</strong> ${escapeHtml(reserva.cliente)}</p>
                    <p><strong>🏢 Empresa:</strong> ${escapeHtml(reserva.empresa) || '—'}</p>
                    <p><strong>👥 Adultos:</strong> ${reserva.adultos}</p>
                    <p><strong>🧒 Menores:</strong> ${reserva.menores}</p>
                    <p><strong>⏰ Horario:</strong> ${escapeHtml(reserva.horario)}</p>
                    <p><strong>👥 Total Pagantes:</strong> ${escapeHtml(reserva.totalPagantes)}</p>
                    <p><strong>💰 Monto Total:</strong> ${formatMoney(reserva.monto)}</p>
                    <p><strong>📱 WhatsApp:</strong> ${reserva.whatsapp || 'No registrado'}</p>
                    <p><strong>🏷️ Estado:</strong> <span class="badge ${getBadgeClass(reserva.estado)}">${reserva.estado}</span></p>
                </div>
            `;
            
            document.getElementById('viewModalBody').innerHTML = html;
            document.getElementById('viewModal').classList.add('active');
        }
        
        function cerrarViewModal() {
            document.getElementById('viewModal').classList.remove('active');
            currentViewReserva = null;
        }
        
        function enviarWhatsappDesdeView() {
            if (currentViewReserva) {
                enviarWhatsapp(currentViewReserva.id);
            }
        }
        
        function exportarExcel() {
            let csv = "ID,Fecha Paseo,Cliente,Empresa,Adultos,Menores,Horario,Total Pagantes,R$ Total,Estado,WhatsApp\n";
            reservasData.forEach(r => {
                csv += `"${r.id}","${r.fecha}","${r.cliente}","${r.empresa || ''}",${r.adultos},${r.menores},"${r.horario}","${r.totalPagantes}","${formatMoney(r.monto)}","${r.estado}","${r.whatsapp || ''}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', 'reservas_angeltour.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            mostrarToast('📥 Exportación completada');
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            const icon = document.getElementById('themeIcon');
            if (document.body.classList.contains('dark-mode')) {
                icon.className = 'ph ph-sun';
            } else {
                icon.className = 'ph ph-moon';
            }
        }
        
        function logout() {
            if (confirm('¿Cerrar sesión?')) {
                sessionStorage.removeItem('admin_logged');
                window.location.href = 'login.html';
            }
        }
        
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            const icon = document.getElementById('themeIcon');
            if (icon) icon.className = 'ph ph-sun';
        }
        
        cargarReservas();
    </script>
</body>
</html>
