<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Panel de Control | Angel Tour Brasil</title>
    <meta name="theme-color" content="#1e6f5c">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.15/index.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #1e6f5c;
            --primary-hover: #155a4a;
            --primary-light: #d1fae5;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-body: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --sidebar-bg: #ffffff;
            --sidebar-text: #475569;
            --sidebar-active-bg: #d1fae5;
            --sidebar-active-text: #1e6f5c;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --radius: 12px;
            --radius-sm: 8px;
        }
        body.dark-mode {
            --bg-body: #0f172a;
            --bg-surface: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --sidebar-bg: #1e293b;
            --sidebar-text: #cbd5e1;
            --sidebar-active-bg: #1e6f5c;
            --sidebar-active-text: #ffffff;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border-color); position: fixed; height: 100vh; z-index: 1001; transition: transform 0.3s; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-color); }
        .brand-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), #0e4b5e); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; }
        .brand-text { font-weight: 700; font-size: 18px; color: var(--text-main); }
        .brand-text span { color: var(--primary); }
        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border-color); margin-top: auto; }
        .user-profile { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: var(--radius-sm); background: var(--bg-body); cursor: pointer; }
        .avatar { width: 36px; height: 36px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
        .main-content { margin-left: 260px; flex: 1; padding: 32px; width: 100%; transition: margin-left 0.3s; }
        .menu-toggle { display: none; position: fixed; top: 16px; left: 16px; z-index: 1002; background: var(--bg-surface); border: 1px solid var(--border-color); width: 44px; height: 44px; border-radius: var(--radius-sm); align-items: center; justify-content: center; cursor: pointer; color: var(--text-main); box-shadow: var(--shadow-md); }
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px); }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
        .page-title h1 { font-size: 24px; font-weight: 700; color: var(--text-main); }
        .page-title p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
        .btn { padding: 10px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-secondary { background: var(--bg-surface); color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background: var(--bg-body); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--bg-surface); border: 1px solid var(--border-color); color: var(--text-muted); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .btn-icon:hover { color: var(--primary); border-color: var(--primary); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 28px; }
        .stat-card { background: var(--bg-surface); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border-color); }
        .stat-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .stat-icon-wrapper { width: 44px; height: 44px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .icon-green { background: #d1fae5; color: #10b981; }
        .icon-blue { background: #e0f2fe; color: #0e4b5e; }
        .icon-purple { background: #f3e8ff; color: #a855f7; }
        .icon-orange { background: #fef3c7; color: #f59e0b; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        .table-section { background: var(--bg-surface); border-radius: var(--radius); border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 28px; }
        .section-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 14px 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); background: var(--bg-body); border-bottom: 1px solid var(--border-color); }
        td { padding: 16px 20px; border-bottom: 1px solid var(--border-color); font-size: 14px; vertical-align: middle; }
        tr:hover td { background: rgba(30, 111, 92, 0.02); }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; }
        .badge-confirmado { background: var(--success-light); color: #047857; }
        .badge-pendiente { background: var(--warning-light); color: #b45309; }
        .dark-mode .badge-confirmado { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .dark-mode .badge-pendiente { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 20px; padding-top: 76px; }
            .menu-toggle { display: flex; }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuBtn"><i class="ph ph-list" style="font-size: 24px;"></i></button>
    <div class="overlay" id="menuOverlay"></div>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand-icon"><i class="ph-bold ph-ship"></i></div>
                <div class="brand-text">Angel Tour <span>Brasil</span></div>
            </div>
            <!-- MENÚ ELIMINADO - SOLO SE MUESTRA EL PERFIL -->
            <div class="sidebar-footer">
                <div class="user-profile" onclick="logout()">
                    <div class="avatar">AT</div>
                    <div style="overflow:hidden;">
                        <h4 style="font-size:13px; font-weight:600; white-space:nowrap;">Administrador</h4>
                        <p style="font-size:11px; color:var(--text-muted);">Cerrar Sesión</p>
                    </div>
                    <i class="ph ph-sign-out" style="margin-left:auto; color:var(--text-muted);"></i>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="page-header">
                <div class="page-title">
                    <h1>Dashboard General</h1>
                    <p>Resumen de reservas, ingresos y ocupación de paseos náuticos.</p>
                </div>
                <div style="display:flex; gap:12px;">
                    <button class="btn-icon" onclick="toggleTheme()"><i class="ph ph-moon" id="themeIcon"></i></button>
                    <button class="btn btn-primary" onclick="location.reload()"><i class="ph ph-arrows-clockwise"></i> Actualizar</button>
                </div>
            </header>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-header"><div><div class="stat-label">Ingresos Totales</div><div class="stat-value" id="totalIngresos">R$ 0</div></div><div class="stat-icon-wrapper icon-green"><i class="ph-fill ph-currency-dollar"></i></div></div></div>
                <div class="stat-card"><div class="stat-header"><div><div class="stat-label">Total Reservas</div><div class="stat-value" id="totalReservas">0</div></div><div class="stat-icon-wrapper icon-blue"><i class="ph-fill ph-calendar-check"></i></div></div></div>
                <div class="stat-card"><div class="stat-header"><div><div class="stat-label">Pasajeros Totales</div><div class="stat-value" id="totalPasajeros">0</div></div><div class="stat-icon-wrapper icon-purple"><i class="ph-fill ph-users-three"></i></div></div></div>
                <div class="stat-card"><div class="stat-header"><div><div class="stat-label">Ocupación Media</div><div class="stat-value" id="ocupacionMedia">0%</div></div><div class="stat-icon-wrapper icon-orange"><i class="ph-fill ph-chart-line"></i></div></div></div>
            </div>
            <div class="table-section">
                <div class="section-header"><h3 class="card-title">Últimas Reservas</h3><button class="btn btn-secondary btn-sm" onclick="cargarDatos()">Actualizar</button></div>
                <div class="table-responsive"><table id="ultimasReservasTable"><thead><tr><th>ID</th><th>Cliente</th><th>Fecha Paseo</th><th>Horario</th><th>Pasajeros</th><th>Monto</th><th>Estado</th></tr></thead><tbody id="ultimasReservasBody"><td><td colspan="7" style="text-align:center;">Cargando...</td></tr></tbody>}</div>
            </div>
        </main>
    </div>
    <script>
        // Verificar sesión
        if (!sessionStorage.getItem("admin_logged")) {
            window.location.href = "login.html";
        }
        
        const SHEETS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTAuEiFi8pDWKqQlsYh5mhMuSZxEojyaM5Vcg-FyBqyCu4FGXFECi5FqhWV4w46oHDcWQSRDxBf4nfm/pubhtml";
        
        let reservasData = [];
        
        async function cargarDatos() {
            try {
                const proxyUrl = 'https://api.allorigins.win/raw?url=';
                const response = await fetch(proxyUrl + encodeURIComponent(SHEETS_URL));
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const tables = doc.getElementsByTagName('table');
                if (tables.length === 0) return;
                const rows = tables[0].getElementsByTagName('tr');
                reservasData = [];
                for (let i = 1; i < rows.length; i++) {
                    const cells = rows[i].getElementsByTagName('td');
                    if (cells.length >= 12) {
                        reservasData.push({
                            id: cells[0]?.textContent?.trim() || '',
                            fecha: cells[1]?.textContent?.trim() || '',
                            nombre: cells[2]?.textContent?.trim() || '',
                            adultos: parseInt(cells[4]?.textContent?.trim()) || 0,
                            menores: parseInt(cells[5]?.textContent?.trim()) || 0,
                            horario: cells[6]?.textContent?.trim() || '',
                            monto: parseFloat(cells[7]?.textContent?.trim().replace('R$', '').replace(',', '')) || 0,
                            estado: cells[11]?.textContent?.trim() || 'Confirmado'
                        });
                    }
                }
                actualizarDashboard();
            } catch(e) { console.error("Error:", e); }
        }
        
        function actualizarDashboard() {
            let totalIngresos = 0, totalPasajeros = 0;
            reservasData.forEach(r => { totalIngresos += r.monto; totalPasajeros += r.adultos + r.menores; });
            document.getElementById('totalIngresos').innerHTML = `R$ ${totalIngresos.toFixed(2)}`;
            document.getElementById('totalReservas').innerHTML = reservasData.length;
            document.getElementById('totalPasajeros').innerHTML = totalPasajeros;
            document.getElementById('ocupacionMedia').innerHTML = reservasData.length > 0 ? `${Math.min(100, Math.round((totalPasajeros / (reservasData.length * 2)) * 100))}%` : '0%';
            
            const ultimas = reservasData.slice(-8).reverse();
            document.getElementById('ultimasReservasBody').innerHTML = ultimas.map(r => `
                <tr>
                    <td style="font-family:monospace;">${r.id}</td>
                    <td style="font-weight:500;">${r.nombre}</td>
                    <td>${r.fecha}</td>
                    <td>${r.horario}</td>
                    <td>${r.adultos + r.menores}</td>
                    <td>R$ ${r.monto.toFixed(2)}</td>
                    <td><span class="badge badge-confirmado">${r.estado}</span></td>
                </tr>
            `).join('');
        }
        
        document.getElementById('menuBtn').addEventListener('click', () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('menuOverlay').classList.toggle('active'); });
        document.getElementById('menuOverlay').addEventListener('click', () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('menuOverlay').classList.remove('active'); });
        
        function toggleTheme() { 
            document.body.classList.toggle('dark-mode'); 
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
            const icon = document.getElementById('themeIcon');
            if (icon) icon.className = document.body.classList.contains('dark-mode') ? 'ph ph-sun' : 'ph ph-moon';
        }
        
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-mode');
            const icon = document.getElementById('themeIcon');
            if (icon) icon.className = 'ph ph-sun';
        }
        
        function logout() { 
            if(confirm('¿Cerrar sesión?')) {
                sessionStorage.removeItem('admin_logged');
                window.location.href = 'reservas.html';
            }
        }
        
        cargarDatos();
    </script>
</body>
</html>
